<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>资产看板 | 全球资产雷达</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="assets">
    <header class="site-header">
      <a class="brand" href="index.html"><span class="brand-mark">GM</span><span><strong>全球资产雷达</strong><small>Global Market Radar</small></span></a>
      <nav class="top-nav" aria-label="主导航">
        <a data-nav="home" href="index.html"><i data-lucide="radar"></i>今日雷达</a>
        <a data-nav="signals" href="signals.html"><i data-lucide="layers-3"></i>影响因素</a>
        <a data-nav="assets" href="assets.html"><i data-lucide="candlestick-chart"></i>资产看板</a>
        <a data-nav="agent" href="agent.html"><i data-lucide="brain-circuit"></i>Agent 分析</a>
        <a data-nav="brief" href="brief.html"><i data-lucide="newspaper"></i>市场日报</a>
        <a data-nav="sources" href="sources.html"><i data-lucide="database"></i>信源分层</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="page-hero compact">
        <div>
          <p class="eyebrow">ASSET MAP</p>
          <h1>资产影响矩阵</h1>
          <p class="lead">同一条宏观消息对股票、债券、黄金、商品和汇率的影响并不相同，这里用矩阵方式拆开看。</p>
        </div>
        <div class="hero-stat"><span>覆盖资产</span><strong>8</strong><small>股票 / 基金 / 黄金 / 债券 / 商品</small></div>
      </section>

      <section class="section-block">
        <div class="asset-grid" id="assetGrid"></div>
      </section>

      <section class="section-block">
        <div class="section-title">
          <div><p class="eyebrow">MATRIX</p><h2>核心因子影响方向</h2></div>
        </div>
        <div class="matrix-table" role="table" aria-label="核心因子影响方向">
          <div class="matrix-row head"><span>因子</span><span>股票</span><span>债券</span><span>黄金</span><span>美元</span><span>商品</span></div>
          <div class="matrix-row"><span>通胀强于预期</span><b class="tone-down">负</b><b class="tone-down">负</b><b class="tone-flat">分歧</b><b class="tone-up">正</b><b class="tone-up">正</b></div>
          <div class="matrix-row"><span>降息预期升温</span><b class="tone-up">正</b><b class="tone-up">正</b><b class="tone-up">正</b><b class="tone-down">负</b><b class="tone-flat">分歧</b></div>
          <div class="matrix-row"><span>地缘风险升级</span><b class="tone-down">负</b><b class="tone-up">正</b><b class="tone-up">正</b><b class="tone-up">正</b><b class="tone-up">正</b></div>
          <div class="matrix-row"><span>盈利预期上修</span><b class="tone-up">正</b><b class="tone-flat">中性</b><b class="tone-down">弱</b><b class="tone-flat">中性</b><b class="tone-up">正</b></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">矩阵用于快速归因，正式版本应结合实时价格、估值分位和仓位约束。</footer>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="app.js"></script>
  </body>
</html>
