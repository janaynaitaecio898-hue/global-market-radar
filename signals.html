<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全部市场动态 | 全球资产雷达</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="signals">
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="index.html"><span class="brand-title">全球资产雷达</span><span class="brand-subtitle">Global Market Radar</span></a>
        <nav class="site-nav" aria-label="主导航">
          <a data-nav="home" href="index.html">精选</a>
          <a data-nav="signals" href="signals.html">全部市场动态</a>
          <a data-nav="brief" href="brief.html">市场日报</a>
          <a data-nav="agent" href="agent.html">Agent 分析</a>
          <a data-nav="assets" href="assets.html">资产看板</a>
          <a data-nav="access" href="access.html">Agent 接入</a>
          <a data-nav="sources" href="sources.html">信源分层</a>
        </nav>
        <a class="login-link" href="agent.html">策略笔记</a>
      </div>
    </header>

    <main class="page">
      <section class="page-title">
        <a class="site-name" href="index.html">全球资产雷达</a>
        <h1>全部市场动态</h1>
        <p>按资产、周期和信源筛选全球股市、基金、黄金、债券和商品信息</p>
      </section>

      <section class="filter-bar">
        <div class="tabs" id="horizonTabs">
          <button class="active" data-horizon="all" type="button">全部</button>
          <button data-horizon="short" type="button">短期</button>
          <button data-horizon="mid" type="button">中期</button>
          <button data-horizon="long" type="button">长期</button>
        </div>
        <div class="filter-row">
          <label class="select-line">
            <span>资产</span>
            <select id="assetSelect">
              <option value="all">全部资产</option>
              <option value="equity">股票</option>
              <option value="bond">债券</option>
              <option value="gold">黄金</option>
              <option value="fx">汇率</option>
              <option value="commodity">商品</option>
            </select>
          </label>
          <label class="search-line">
            <span>搜索</span>
            <input id="searchInput" type="search" placeholder="美联储 / ETF / 原油 / 地缘" />
          </label>
        </div>
      </section>

      <section class="feed" id="allSignalList" aria-label="全部市场动态"></section>
    </main>

    <footer class="site-footer">每条信息都应保留原文链接、发布时间、抓取时间、摘要模型和核验状态。</footer>
    <script src="app.js"></script>
  </body>
</html>
